name: Bug Report
description: Report a bug with rimshot
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide:
        - OS and version
        - Bash version (`bash --version`)
        - Claude Code version (`claude --version`)
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Contents of your `rimshot.conf` (if applicable)
      render: shell
    validations:
      required: false
